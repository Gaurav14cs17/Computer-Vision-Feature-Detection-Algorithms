<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550">
  <!-- Dark Background -->
  <rect width="950" height="550" fill="#1a1a1a"/>
  
  <!-- Title -->
  <text x="475" y="35" fill="#00bfff" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">HOG Dense Processing - EVERY Pixel Contributes</text>
  <text x="475" y="58" fill="#888" font-family="Arial" font-size="12" text-anchor="middle">Unlike SIFT/SURF/ORB (sparse keypoints), HOG processes ALL 307,200 pixels like convolution</text>
  
  <!-- ============ FULL IMAGE - DENSE PROCESSING ============ -->
  <g transform="translate(40, 85)">
    <rect x="0" y="0" width="380" height="280" fill="#222" stroke="#00bfff" stroke-width="2" rx="8"/>
    <text x="190" y="25" fill="#00bfff" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Full Image (640 x 480) - ALL Pixels</text>
    
    <!-- Image with dense grid overlay -->
    <rect x="15" y="40" width="350" height="220" fill="#2a2a2a" stroke="#444" stroke-width="1" rx="3"/>
    
    <!-- Dense processing visualization - show gradient at every cell -->
    <g transform="translate(15, 40)">
      <!-- Grid lines showing 8x8 cells -->
      <g stroke="#2ecc71" stroke-width="0.3" opacity="0.5">
        <!-- Vertical lines -->
        <line x1="25" y1="0" x2="25" y2="220"/>
        <line x1="50" y1="0" x2="50" y2="220"/>
        <line x1="75" y1="0" x2="75" y2="220"/>
        <line x1="100" y1="0" x2="100" y2="220"/>
        <line x1="125" y1="0" x2="125" y2="220"/>
        <line x1="150" y1="0" x2="150" y2="220"/>
        <line x1="175" y1="0" x2="175" y2="220"/>
        <line x1="200" y1="0" x2="200" y2="220"/>
        <line x1="225" y1="0" x2="225" y2="220"/>
        <line x1="250" y1="0" x2="250" y2="220"/>
        <line x1="275" y1="0" x2="275" y2="220"/>
        <line x1="300" y1="0" x2="300" y2="220"/>
        <line x1="325" y1="0" x2="325" y2="220"/>
        <!-- Horizontal lines -->
        <line x1="0" y1="25" x2="350" y2="25"/>
        <line x1="0" y1="50" x2="350" y2="50"/>
        <line x1="0" y1="75" x2="350" y2="75"/>
        <line x1="0" y1="100" x2="350" y2="100"/>
        <line x1="0" y1="125" x2="350" y2="125"/>
        <line x1="0" y1="150" x2="350" y2="150"/>
        <line x1="0" y1="175" x2="350" y2="175"/>
        <line x1="0" y1="200" x2="350" y2="200"/>
      </g>
      
      <!-- Gradient arrows in cells -->
      <g stroke="#ffa500" stroke-width="1.5" fill="#ffa500">
        <!-- Row 1 -->
        <line x1="12" y1="12" x2="20" y2="8"/><polygon points="22,7 17,10 17,5"/>
        <line x1="37" y1="15" x2="37" y2="7"/><polygon points="37,5 34,10 40,10"/>
        <line x1="62" y1="10" x2="70" y2="15"/><polygon points="72,16 67,18 69,12"/>
        <line x1="87" y1="12" x2="95" y2="8"/><polygon points="97,7 92,10 92,5"/>
        <!-- Row 2 -->
        <line x1="12" y1="37" x2="20" y2="33"/><polygon points="22,32 17,35 17,30"/>
        <line x1="37" y1="35" x2="45" y2="35"/><polygon points="47,35 42,32 42,38"/>
        <line x1="62" y1="38" x2="62" y2="30"/><polygon points="62,28 59,33 65,33"/>
        <line x1="87" y1="35" x2="95" y2="40"/><polygon points="97,41 92,43 94,37"/>
        <!-- ... more cells would follow -->
      </g>
      
      <!-- Highlight current processing cell (red) -->
      <rect x="25" y="25" width="25" height="25" fill="none" stroke="#ff6b6b" stroke-width="3"/>
      <text x="37" y="42" fill="#ff6b6b" font-family="Arial" font-size="8" text-anchor="middle">8x8</text>
    </g>
    
    <!-- Legend -->
    <g transform="translate(25, 250)">
      <rect x="0" y="-5" width="15" height="15" fill="#2ecc71" opacity="0.3" stroke="#2ecc71"/>
      <text x="22" y="6" fill="#2ecc71" font-family="Arial" font-size="9">8x8 cell (9-bin histogram)</text>
      
      <rect x="160" y="-5" width="15" height="15" fill="none" stroke="#ff6b6b" stroke-width="2"/>
      <text x="182" y="6" fill="#ff6b6b" font-family="Arial" font-size="9">Current cell processing</text>
    </g>
  </g>
  
  <!-- ============ PROCESSING FLOW ============ -->
  
  <!-- Arrow from Image to Process Box -->
  <g transform="translate(430, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#fff" stroke-width="3"/>
    <polygon points="55,0 45,-7 45,7" fill="#fff"/>
    <text x="27" y="-10" fill="#2ecc71" font-family="Arial" font-size="10" text-anchor="middle">EVERY PIXEL</text>
  </g>
  
  <!-- Process Box -->
  <g transform="translate(495, 85)">
    <rect x="0" y="0" width="200" height="230" fill="#222" stroke="#2ecc71" stroke-width="3" rx="8"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="200" height="35" fill="#2ecc71" rx="8"/>
    <rect x="0" y="20" width="200" height="15" fill="#2ecc71"/>
    <text x="100" y="24" fill="#fff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Dense Processing Steps</text>
    
    <!-- Step 1: Gradient -->
    <g transform="translate(15, 45)">
      <rect x="0" y="0" width="170" height="40" fill="#2a2a2a" stroke="#e74c3c" stroke-width="1" rx="4"/>
      <text x="85" y="18" fill="#e74c3c" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Step 3: Gradients</text>
      <text x="85" y="32" fill="#888" font-family="Arial" font-size="8" text-anchor="middle">Gx, Gy, M, theta at EVERY pixel</text>
    </g>
    
    <!-- Arrow -->
    <line x1="100" y1="90" x2="100" y2="100" stroke="#666" stroke-width="1.5"/>
    <polygon points="100,105 96,97 104,97" fill="#666"/>
    
    <!-- Step 2: Cell Histograms -->
    <g transform="translate(15, 110)">
      <rect x="0" y="0" width="170" height="40" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1" rx="4"/>
      <text x="85" y="18" fill="#9b59b6" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Step 4: Cell Histograms</text>
      <text x="85" y="32" fill="#888" font-family="Arial" font-size="8" text-anchor="middle">80x60 = 4800 cells, 9 bins each</text>
    </g>
    
    <!-- Arrow -->
    <line x1="100" y1="155" x2="100" y2="165" stroke="#666" stroke-width="1.5"/>
    <polygon points="100,170 96,162 104,162" fill="#666"/>
    
    <!-- Step 3: Block Normalization -->
    <g transform="translate(15, 175)">
      <rect x="0" y="0" width="170" height="45" fill="#2a2a2a" stroke="#ffa500" stroke-width="1" rx="4"/>
      <text x="85" y="18" fill="#ffa500" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Step 5: Block Normalize</text>
      <text x="85" y="32" fill="#888" font-family="Arial" font-size="8" text-anchor="middle">79x59 = 4661 blocks, L2-norm</text>
      <text x="85" y="42" fill="#fff" font-family="Arial" font-size="8" text-anchor="middle">Final: 167,796-D descriptor</text>
    </g>
  </g>
  
  <!-- Arrow to Output -->
  <g transform="translate(705, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#fff" stroke-width="3"/>
    <polygon points="55,0 45,-7 45,7" fill="#fff"/>
  </g>
  
  <!-- Output -->
  <g transform="translate(770, 100)">
    <rect x="0" y="0" width="150" height="180" fill="#222" stroke="#ffa500" stroke-width="3" rx="8"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="150" height="35" fill="#ffa500" rx="8"/>
    <rect x="0" y="20" width="150" height="15" fill="#ffa500"/>
    <text x="75" y="24" fill="#fff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">HOG Descriptor</text>
    
    <!-- Descriptor visualization -->
    <g transform="translate(15, 50)">
      <text x="60" y="0" fill="#fff" font-family="Arial" font-size="11" text-anchor="middle">167,796 values</text>
      <rect x="0" y="10" width="120" height="30" fill="#ffa500" opacity="0.3" stroke="#ffa500" rx="3"/>
      <text x="60" y="30" fill="#fff" font-family="monospace" font-size="8" text-anchor="middle">[0.12, 0.08, 0.23, ...]</text>
      
      <text x="60" y="60" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">One descriptor for</text>
      <text x="60" y="75" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">ENTIRE window</text>
      
      <text x="60" y="100" fill="#2ecc71" font-family="Arial" font-size="10" text-anchor="middle">Feed to SVM</text>
      <text x="60" y="115" fill="#2ecc71" font-family="Arial" font-size="10" text-anchor="middle">for classification</text>
    </g>
  </g>
  
  <!-- ============ BOTTOM: HOG vs SPARSE COMPARISON ============ -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="870" height="140" fill="#222" stroke="#ff6b6b" stroke-width="2" rx="8"/>
    <text x="435" y="25" fill="#ff6b6b" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Critical Difference: HOG is DENSE (Like Convolution), NOT Sparse Keypoints</text>
    
    <!-- Sparse (SIFT/ORB) -->
    <g transform="translate(50, 45)">
      <rect x="0" y="0" width="150" height="80" fill="#2a2a2a" stroke="#888" stroke-width="2" rx="5"/>
      <text x="75" y="20" fill="#888" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">SIFT/SURF/ORB</text>
      <text x="75" y="40" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Sparse keypoints</text>
      <text x="75" y="55" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">~500-3000 locations</text>
      <text x="75" y="70" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Feature matching</text>
    </g>
    
    <!-- VS -->
    <text x="235" y="90" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">vs</text>
    
    <!-- Dense (HOG) -->
    <g transform="translate(270, 45)">
      <rect x="0" y="0" width="150" height="80" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2" rx="5"/>
      <text x="75" y="20" fill="#2ecc71" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">HOG</text>
      <text x="75" y="40" fill="#2ecc71" font-family="Arial" font-size="9" text-anchor="middle">Dense - ALL pixels</text>
      <text x="75" y="55" fill="#2ecc71" font-family="Arial" font-size="9" text-anchor="middle">307,200 positions</text>
      <text x="75" y="70" fill="#2ecc71" font-family="Arial" font-size="9" text-anchor="middle">Object detection</text>
    </g>
    
    <!-- Key differences -->
    <g transform="translate(460, 45)">
      <text x="0" y="0" fill="#fff" font-family="Arial" font-size="11" font-weight="bold">HOG Computes Gradients Like Convolution:</text>
      <text x="0" y="20" fill="#ffa500" font-family="Arial" font-size="10">- Slide 1x1 kernel over EVERY pixel (stride=1)</text>
      <text x="0" y="35" fill="#ffa500" font-family="Arial" font-size="10">- Gx = I(x+1,y) - I(x-1,y) at each position</text>
      <text x="0" y="50" fill="#ffa500" font-family="Arial" font-size="10">- Result: 640x480 gradient values</text>
      <text x="0" y="70" fill="#888" font-family="Arial" font-size="10">Then aggregate into cells and blocks</text>
    </g>
  </g>
  
</svg>
