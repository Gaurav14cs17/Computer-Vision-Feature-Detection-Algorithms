<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550">
  <!-- Dark Background -->
  <rect width="950" height="550" fill="#1a1a1a"/>
  
  <!-- Title -->
  <text x="475" y="35" fill="#00bfff" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">SIFT Description Phase - Full Image Processing</text>
  <text x="475" y="58" fill="#888" font-family="Arial" font-size="12" text-anchor="middle">Loop through ALL 847 keypoints and create 128-D descriptor for each</text>
  
  <!-- ============ FULL IMAGE WITH ALL KEYPOINTS ============ -->
  <g transform="translate(40, 85)">
    <rect x="0" y="0" width="380" height="280" fill="#222" stroke="#00bfff" stroke-width="2" rx="8"/>
    <text x="190" y="25" fill="#00bfff" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Full Image (640 x 480) - 847 Keypoints</text>
    
    <!-- Image simulation -->
    <rect x="15" y="40" width="350" height="220" fill="#2a2a2a" stroke="#444" stroke-width="1" rx="3"/>
    
    <!-- Image content regions -->
    <rect x="30" y="60" width="90" height="65" fill="#3d5a73" opacity="0.4" rx="2"/>
    <rect x="150" y="90" width="120" height="95" fill="#4a6b8a" opacity="0.35" rx="2"/>
    <rect x="60" y="150" width="80" height="60" fill="#2d4a5e" opacity="0.45" rx="2"/>
    <rect x="280" y="55" width="70" height="75" fill="#3d5a73" opacity="0.4" rx="2"/>
    <rect x="240" y="170" width="100" height="70" fill="#4a6b8a" opacity="0.35" rx="2"/>
    
    <!-- Keypoint 1 - PROCESSING NOW (Red) -->
    <circle cx="75" cy="92" r="24" fill="none" stroke="#ff6b6b" stroke-width="3"/>
    <circle cx="75" cy="92" r="5" fill="#ff6b6b"/>
    <line x1="75" y1="92" x2="75" y2="70" stroke="#ff6b6b" stroke-width="2"/>
    <polygon points="75,66 71,75 79,75" fill="#ff6b6b"/>
    
    <!-- Keypoint 2 - DONE (Green) -->
    <circle cx="210" cy="137" r="28" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <circle cx="210" cy="137" r="4" fill="#2ecc71"/>
    <text x="210" y="142" fill="#2ecc71" font-family="Arial" font-size="14" text-anchor="middle">OK</text>
    
    <!-- Keypoint 3 - DONE (Green) -->
    <circle cx="100" cy="180" r="20" fill="none" stroke="#2ecc71" stroke-width="2"/>
    <circle cx="100" cy="180" r="3" fill="#2ecc71"/>
    <text x="100" y="184" fill="#2ecc71" font-family="Arial" font-size="12" text-anchor="middle">OK</text>
    
    <!-- Keypoint 4 - WAITING (Gray dashed) -->
    <circle cx="315" cy="92" r="22" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="315" cy="92" r="3" fill="#666"/>
    
    <!-- Keypoint 5 - WAITING -->
    <circle cx="175" cy="70" r="18" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="175" cy="70" r="3" fill="#666"/>
    
    <!-- Keypoint 6 - WAITING -->
    <circle cx="290" cy="205" r="25" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="290" cy="205" r="3" fill="#666"/>
    
    <!-- Keypoint 7 - WAITING -->
    <circle cx="55" cy="220" r="16" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="55" cy="220" r="3" fill="#666"/>
    
    <!-- Keypoint 8 - WAITING -->
    <circle cx="330" cy="160" r="19" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="330" cy="160" r="3" fill="#666"/>
    
    <!-- More dots representing other keypoints -->
    <circle cx="140" cy="115" r="2" fill="#555"/>
    <circle cx="250" cy="85" r="2" fill="#555"/>
    <circle cx="185" cy="200" r="2" fill="#555"/>
    <circle cx="125" cy="235" r="2" fill="#555"/>
    <circle cx="270" cy="130" r="2" fill="#555"/>
    <circle cx="45" cy="145" r="2" fill="#555"/>
    <circle cx="340" cy="230" r="2" fill="#555"/>
    <circle cx="220" cy="225" r="2" fill="#555"/>
    
    <!-- Legend -->
    <g transform="translate(25, 250)">
      <circle cx="8" cy="0" r="6" fill="none" stroke="#ff6b6b" stroke-width="2"/>
      <text x="20" y="4" fill="#ff6b6b" font-family="Arial" font-size="9">Processing</text>
      
      <circle cx="95" cy="0" r="6" fill="none" stroke="#2ecc71" stroke-width="2"/>
      <text x="107" y="4" fill="#2ecc71" font-family="Arial" font-size="9">Done</text>
      
      <circle cx="165" cy="0" r="6" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="3,2"/>
      <text x="177" y="4" fill="#666" font-family="Arial" font-size="9">Waiting (843 more)</text>
    </g>
  </g>
  
  <!-- ============ PROCESSING FLOW ============ -->
  
  <!-- Arrow from Image to Process Box -->
  <g transform="translate(430, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#fff" stroke-width="3"/>
    <polygon points="55,0 45,-7 45,7" fill="#fff"/>
    <text x="27" y="-10" fill="#ffa500" font-family="Arial" font-size="10" text-anchor="middle">FOR EACH</text>
  </g>
  
  <!-- Process Box for Current Keypoint -->
  <g transform="translate(495, 100)">
    <rect x="0" y="0" width="200" height="200" fill="#222" stroke="#ff6b6b" stroke-width="3" rx="8"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="200" height="35" fill="#ff6b6b" rx="8"/>
    <rect x="0" y="20" width="200" height="15" fill="#ff6b6b"/>
    <text x="100" y="24" fill="#fff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Processing KP at (75, 92)</text>
    
    <!-- Step 5 -->
    <g transform="translate(15, 50)">
      <rect x="0" y="0" width="170" height="55" fill="#2a2a2a" stroke="#ffa500" stroke-width="1" rx="4"/>
      <text x="85" y="18" fill="#ffa500" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Step 5: Orientation</text>
      <text x="85" y="35" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">36-bin histogram</text>
      <text x="85" y="48" fill="#fff" font-family="Arial" font-size="10" text-anchor="middle">theta = 72 deg</text>
    </g>
    
    <!-- Arrow -->
    <line x1="100" y1="110" x2="100" y2="125" stroke="#666" stroke-width="1.5"/>
    <polygon points="100,130 96,122 104,122" fill="#666"/>
    
    <!-- Step 6 -->
    <g transform="translate(15, 135)">
      <rect x="0" y="0" width="170" height="55" fill="#2a2a2a" stroke="#9b59b6" stroke-width="1" rx="4"/>
      <text x="85" y="18" fill="#9b59b6" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Step 6: Descriptor</text>
      <text x="85" y="35" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">4x4 grid, 8-bin each</text>
      <text x="85" y="48" fill="#fff" font-family="Arial" font-size="10" text-anchor="middle">128-D vector</text>
    </g>
  </g>
  
  <!-- Arrow to Output -->
  <g transform="translate(705, 200)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#fff" stroke-width="3"/>
    <polygon points="55,0 45,-7 45,7" fill="#fff"/>
  </g>
  
  <!-- Output Storage -->
  <g transform="translate(770, 100)">
    <rect x="0" y="0" width="150" height="200" fill="#222" stroke="#2ecc71" stroke-width="3" rx="8"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="150" height="35" fill="#2ecc71" rx="8"/>
    <rect x="0" y="20" width="150" height="15" fill="#2ecc71"/>
    <text x="75" y="24" fill="#fff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">STORE Result</text>
    
    <!-- Stored keypoints list -->
    <g transform="translate(10, 45)">
      <text x="0" y="12" fill="#2ecc71" font-family="Arial" font-size="9">KP1: (210,137) + 128-D</text>
      <text x="0" y="28" fill="#2ecc71" font-family="Arial" font-size="9">KP2: (100,180) + 128-D</text>
      <text x="0" y="44" fill="#ff6b6b" font-family="Arial" font-size="9" font-weight="bold">KP3: (75,92) + 128-D</text>
      <text x="0" y="60" fill="#666" font-family="Arial" font-size="9">KP4: waiting...</text>
      <text x="0" y="76" fill="#666" font-family="Arial" font-size="9">KP5: waiting...</text>
      <text x="0" y="92" fill="#666" font-family="Arial" font-size="9">...</text>
      <text x="0" y="108" fill="#666" font-family="Arial" font-size="9">KP847: waiting...</text>
    </g>
    
    <!-- Progress -->
    <g transform="translate(10, 165)">
      <rect x="0" y="0" width="130" height="8" fill="#333" rx="4"/>
      <rect x="0" y="0" width="5" height="8" fill="#2ecc71" rx="4"/>
      <text x="65" y="22" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">3 / 847 done</text>
    </g>
  </g>
  
  <!-- ============ BOTTOM: NOT CONVOLUTION COMPARISON ============ -->
  <g transform="translate(40, 390)">
    <rect x="0" y="0" width="870" height="140" fill="#222" stroke="#ffa500" stroke-width="2" rx="8"/>
    <text x="435" y="25" fill="#ffa500" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Key Point: Processes ONLY Keypoint Locations (NOT Convolution)</text>
    
    <!-- NOT Convolution -->
    <g transform="translate(50, 45)">
      <rect x="0" y="0" width="120" height="80" fill="#2a2a2a" stroke="#ff6b6b" stroke-width="2" rx="5"/>
      
      <!-- Grid showing all pixels -->
      <g transform="translate(10, 10)">
        <rect x="0" y="0" width="60" height="60" fill="#ff6b6b" opacity="0.3"/>
        <!-- X mark -->
        <line x1="5" y1="5" x2="55" y2="55" stroke="#ff6b6b" stroke-width="3"/>
        <line x1="55" y1="5" x2="5" y2="55" stroke="#ff6b6b" stroke-width="3"/>
      </g>
      
      <text x="95" y="30" fill="#ff6b6b" font-family="Arial" font-size="9" font-weight="bold">NOT</text>
      <text x="95" y="45" fill="#ff6b6b" font-family="Arial" font-size="9" font-weight="bold">THIS</text>
      
      <text x="60" y="95" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">All 307,200 pixels</text>
    </g>
    
    <!-- VS -->
    <text x="220" y="90" fill="#fff" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">vs</text>
    
    <!-- Sparse Keypoints -->
    <g transform="translate(270, 45)">
      <rect x="0" y="0" width="120" height="80" fill="#2a2a2a" stroke="#2ecc71" stroke-width="2" rx="5"/>
      
      <!-- Sparse keypoint circles -->
      <g transform="translate(10, 10)">
        <rect x="0" y="0" width="60" height="60" fill="none" stroke="#444" stroke-width="1"/>
        <circle cx="12" cy="15" r="8" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
        <circle cx="45" cy="22" r="10" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
        <circle cx="25" cy="45" r="7" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
        <circle cx="52" cy="50" r="6" fill="none" stroke="#2ecc71" stroke-width="1.5"/>
      </g>
      
      <text x="95" y="35" fill="#2ecc71" font-family="Arial" font-size="11" font-weight="bold">YES</text>
      
      <text x="60" y="95" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Only 847 locations</text>
    </g>
    
    <!-- Explanation -->
    <g transform="translate(430, 50)">
      <text x="0" y="0" fill="#fff" font-family="Arial" font-size="11">Description Phase does NOT slide a window across entire image.</text>
      <text x="0" y="20" fill="#fff" font-family="Arial" font-size="11">It processes ONLY the 847 keypoint locations detected in Step 3-4.</text>
      <text x="0" y="45" fill="#888" font-family="Arial" font-size="10">For each keypoint at (x, y, scale):</text>
      <text x="20" y="62" fill="#ffa500" font-family="Arial" font-size="10">1. Extract region centered at (x, y)</text>
      <text x="20" y="78" fill="#ffa500" font-family="Arial" font-size="10">2. Compute orientation and 128-D descriptor</text>
    </g>
  </g>
  
</svg>
