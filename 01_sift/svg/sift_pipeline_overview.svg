<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="950" height="550" viewBox="0 0 950 550">
  <!-- Dark Background -->
  <rect width="950" height="550" fill="#1a1a1a"/>
  
  <!-- Title -->
  <text x="475" y="35" fill="#00bfff" font-family="Arial" font-size="26" font-weight="bold" text-anchor="middle">SIFT Pipeline Overview</text>
  <text x="475" y="58" fill="#888" font-family="Arial" font-size="12" text-anchor="middle">Scale-Invariant Feature Transform - The Gold Standard for Feature Detection</text>
  
  <!-- Step 1: Gaussian Pyramid -->
  <g transform="translate(30, 90)">
    <rect x="0" y="0" width="180" height="120" fill="#222" stroke="#00bfff" stroke-width="2" rx="8"/>
    <text x="90" y="25" fill="#00bfff" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 1: Gaussian Pyramid</text>
    <!-- Pyramid levels -->
    <rect x="30" y="40" width="120" height="18" fill="#00bfff" opacity="0.5" stroke="#00bfff" rx="2"/>
    <text x="90" y="53" fill="#fff" font-family="Arial" font-size="8" text-anchor="middle">Octave 0</text>
    <rect x="40" y="55" width="100" height="15" fill="#00bfff" opacity="0.4" stroke="#00bfff" rx="2"/>
    <text x="90" y="66" fill="#fff" font-family="Arial" font-size="7" text-anchor="middle">Octave 1</text>
    <rect x="50" y="68" width="80" height="12" fill="#00bfff" opacity="0.3" stroke="#00bfff" rx="2"/>
    <text x="90" y="77" fill="#fff" font-family="Arial" font-size="6" text-anchor="middle">Octave 2</text>
    <text x="90" y="100" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">L(x,y,sigma) = G * I</text>
    <text x="90" y="112" fill="#888" font-family="Arial" font-size="8" text-anchor="middle">sigma_0 = 1.6, k = 2^(1/S)</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(215, 145)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#fff" stroke-width="2"/>
    <polygon points="35,0 28,-5 28,5" fill="#fff"/>
  </g>
  
  <!-- Step 2: DoG -->
  <g transform="translate(255, 90)">
    <rect x="0" y="0" width="180" height="120" fill="#222" stroke="#ffa500" stroke-width="2" rx="8"/>
    <text x="90" y="25" fill="#ffa500" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 2: DoG</text>
    <rect x="20" y="40" width="60" height="40" fill="#ffa500" opacity="0.4" stroke="#ffa500" rx="2"/>
    <text x="50" y="65" fill="#fff" font-family="Arial" font-size="9" text-anchor="middle">G(k*s)</text>
    <text x="95" y="60" fill="#fff" font-family="Arial" font-size="16">-</text>
    <rect x="110" y="40" width="50" height="35" fill="#ffa500" opacity="0.3" stroke="#ffa500" rx="2"/>
    <text x="135" y="63" fill="#fff" font-family="Arial" font-size="9" text-anchor="middle">G(s)</text>
    <text x="90" y="100" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">D = L(k*sigma) - L(sigma)</text>
    <text x="90" y="112" fill="#888" font-family="Arial" font-size="8" text-anchor="middle">Approximates LoG</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(440, 145)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#fff" stroke-width="2"/>
    <polygon points="35,0 28,-5 28,5" fill="#fff"/>
  </g>
  
  <!-- Step 3: Keypoint Detection -->
  <g transform="translate(480, 90)">
    <rect x="0" y="0" width="180" height="120" fill="#222" stroke="#e74c3c" stroke-width="2" rx="8"/>
    <text x="90" y="25" fill="#e74c3c" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 3: Keypoints</text>
    <rect x="15" y="40" width="150" height="50" fill="#2a2a2a" stroke="#444" rx="3"/>
    <!-- 3x3x3 cube suggestion -->
    <rect x="50" y="50" width="25" height="25" fill="none" stroke="#e74c3c" stroke-width="1"/>
    <rect x="55" y="45" width="25" height="25" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.6"/>
    <rect x="60" y="40" width="25" height="25" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3"/>
    <circle cx="62" cy="55" r="4" fill="#e74c3c"/>
    <text x="105" y="60" fill="#fff" font-family="Arial" font-size="9">26-nbr</text>
    <text x="90" y="105" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Local extrema in (x,y,scale)</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(665, 145)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#fff" stroke-width="2"/>
    <polygon points="35,0 28,-5 28,5" fill="#fff"/>
  </g>
  
  <!-- Step 4: Filtering -->
  <g transform="translate(705, 90)">
    <rect x="0" y="0" width="180" height="120" fill="#222" stroke="#9b59b6" stroke-width="2" rx="8"/>
    <text x="90" y="25" fill="#9b59b6" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 4: Filter</text>
    <text x="90" y="50" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Low Contrast: |D(x)| &lt; 0.03</text>
    <text x="90" y="68" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Edge: Tr(H)^2/Det(H) > 12.1</text>
    <text x="90" y="86" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">Unstable: |offset| > 0.5</text>
    <text x="90" y="108" fill="#2ecc71" font-family="Arial" font-size="10" text-anchor="middle">1124 -> 847 keypoints</text>
  </g>
  
  <!-- Second Row -->
  <!-- Step 5: Orientation -->
  <g transform="translate(255, 250)">
    <rect x="0" y="0" width="200" height="120" fill="#222" stroke="#f39c12" stroke-width="2" rx="8"/>
    <text x="100" y="25" fill="#f39c12" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 5: Orientation</text>
    <circle cx="100" cy="70" r="35" fill="none" stroke="#f39c12" stroke-width="2"/>
    <circle cx="100" cy="70" r="4" fill="#f39c12"/>
    <line x1="100" y1="70" x2="125" y2="50" stroke="#f39c12" stroke-width="3"/>
    <polygon points="128,47 120,52 123,58" fill="#f39c12"/>
    <text x="100" y="115" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">36-bin gradient histogram</text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(460, 310)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#fff" stroke-width="2"/>
    <polygon points="35,0 28,-5 28,5" fill="#fff"/>
  </g>
  
  <!-- Step 6: Descriptor -->
  <g transform="translate(500, 250)">
    <rect x="0" y="0" width="200" height="120" fill="#222" stroke="#2ecc71" stroke-width="2" rx="8"/>
    <text x="100" y="25" fill="#2ecc71" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">Step 6: 128-D Descriptor</text>
    <!-- 4x4 grid -->
    <g transform="translate(50, 40)">
      <rect x="0" y="0" width="20" height="20" fill="#2ecc71" opacity="0.3" stroke="#2ecc71"/>
      <rect x="20" y="0" width="20" height="20" fill="#2ecc71" opacity="0.4" stroke="#2ecc71"/>
      <rect x="40" y="0" width="20" height="20" fill="#2ecc71" opacity="0.3" stroke="#2ecc71"/>
      <rect x="60" y="0" width="20" height="20" fill="#2ecc71" opacity="0.5" stroke="#2ecc71"/>
      <rect x="0" y="20" width="20" height="20" fill="#2ecc71" opacity="0.4" stroke="#2ecc71"/>
      <rect x="20" y="20" width="20" height="20" fill="#2ecc71" opacity="0.5" stroke="#2ecc71"/>
      <rect x="40" y="20" width="20" height="20" fill="#2ecc71" opacity="0.4" stroke="#2ecc71"/>
      <rect x="60" y="20" width="20" height="20" fill="#2ecc71" opacity="0.3" stroke="#2ecc71"/>
      <rect x="0" y="40" width="20" height="20" fill="#2ecc71" opacity="0.5" stroke="#2ecc71"/>
      <rect x="20" y="40" width="20" height="20" fill="#2ecc71" opacity="0.3" stroke="#2ecc71"/>
      <rect x="40" y="40" width="20" height="20" fill="#2ecc71" opacity="0.5" stroke="#2ecc71"/>
      <rect x="60" y="40" width="20" height="20" fill="#2ecc71" opacity="0.4" stroke="#2ecc71"/>
    </g>
    <text x="100" y="110" fill="#888" font-family="Arial" font-size="9" text-anchor="middle">4x4 subregions x 8 bins</text>
  </g>
  
  <!-- Key Properties Box -->
  <g transform="translate(30, 400)">
    <rect x="0" y="0" width="890" height="130" fill="#222" stroke="#00bfff" stroke-width="2" rx="8"/>
    <text x="445" y="25" fill="#00bfff" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">SIFT Key Properties</text>
    
    <g transform="translate(30, 45)">
      <text x="0" y="0" fill="#ffa500" font-family="Arial" font-size="11" font-weight="bold">1. Scale Invariant</text>
      <text x="0" y="18" fill="#888" font-family="Arial" font-size="10">Multi-octave Gaussian pyramid</text>
    </g>
    
    <g transform="translate(220, 45)">
      <text x="0" y="0" fill="#ffa500" font-family="Arial" font-size="11" font-weight="bold">2. Rotation Invariant</text>
      <text x="0" y="18" fill="#888" font-family="Arial" font-size="10">36-bin orientation histogram</text>
    </g>
    
    <g transform="translate(440, 45)">
      <text x="0" y="0" fill="#ffa500" font-family="Arial" font-size="11" font-weight="bold">3. 128-D Float Descriptor</text>
      <text x="0" y="18" fill="#888" font-family="Arial" font-size="10">Highly distinctive fingerprint</text>
    </g>
    
    <g transform="translate(680, 45)">
      <text x="0" y="0" fill="#ffa500" font-family="Arial" font-size="11" font-weight="bold">4. Sub-pixel Accuracy</text>
      <text x="0" y="18" fill="#888" font-family="Arial" font-size="10">Taylor expansion refinement</text>
    </g>
    
    <text x="445" y="100" fill="#2ecc71" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">The gold standard for feature matching since 2004</text>
  </g>
  
</svg>
